# .github/workflows/fetch-toolchain.yml
name: Descargar y Subir Toolchain al Repo

on:
  workflow_dispatch:
    inputs:
      toolchain_type:
        description: 'Tipo de toolchain'
        required: true
        type: choice
        options:
          - android-ndk
          - arm-gnu-toolchain
          - aosp-clang
          - custom-url
      version:
        description: 'Versión (ej. r26d para NDK, 13.2.rel1 para ARM GNU, clang-r487747c para AOSP)'
        required: false
        default: ''
      custom_url:
        description: 'URL directa (solo si toolchain_type=custom-url)'
        required: false
        default: ''
      output_dir:
        description: 'Carpeta destino dentro del repo para el toolchain'
        required: true
        default: 'prebuilts/toolchain'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Liberar espacio en disco
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force || true
          df -h

      - name: Resolver URL de descarga
        id: resolve
        run: |
          TYPE="${{ inputs.toolchain_type }}"
          VER="${{ inputs.version }}"
          URL=""

          case "$TYPE" in
            android-ndk)
              URL="https://dl.google.com/android/repository/android-ndk-${VER}-linux.zip"
              ;;
            arm-gnu-toolchain)
              URL="https://developer.arm.com/-/media/Files/downloads/gnu/${VER}/binrel/arm-gnu-toolchain-${VER}-x86_64-aarch64-none-linux-gnu.tar.xz"
              ;;
            aosp-clang)
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${VER}.tar.gz"
              ;;
            custom-url)
              URL="${{ inputs.custom_url }}"
              ;;
          esac

          if [ -z "$URL" ]; then
            echo "No se pudo resolver la URL. Revisa el tipo/versión."
            exit 1
          fi

          echo "URL resuelta: $URL"
          echo "download_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Descargar toolchain
        run: |
          mkdir -p /tmp/toolchain_download
          cd /tmp/toolchain_download
          FILENAME=$(basename "${{ steps.resolve.outputs.download_url }}")
          curl -L --fail -o "$FILENAME" "${{ steps.resolve.outputs.download_url }}"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          ls -lh

      - name: Extraer directamente en el repo
        run: |
          rm -rf "${{ inputs.output_dir }}"
          mkdir -p "${{ inputs.output_dir }}"
          cd /tmp/toolchain_download
          case "$FILENAME" in
            *.tar.xz)
              tar -xJf "$FILENAME" -C "$GITHUB_WORKSPACE/${{ inputs.output_dir }}"
              ;;
            *.tar.gz|*.tgz)
              tar -xzf "$FILENAME" -C "$GITHUB_WORKSPACE/${{ inputs.output_dir }}"
              ;;
            *.zip)
              unzip -q "$FILENAME" -d "$GITHUB_WORKSPACE/${{ inputs.output_dir }}"
              ;;
            *)
              echo "Formato desconocido, no se pudo extraer: $FILENAME"
              exit 1
              ;;
          esac
          echo "Contenido extraído:"
          find "$GITHUB_WORKSPACE/${{ inputs.output_dir }}" -maxdepth 2
          echo "Tamaño total:"
          du -sh "$GITHUB_WORKSPACE/${{ inputs.output_dir }}"

      - name: Commit y push al repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add "${{ inputs.output_dir }}"
          git diff --cached --quiet && echo "Nada que commitear" && exit 0
          git commit -m "Add extracted toolcha
